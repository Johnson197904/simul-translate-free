# render.yaml - Render Blueprint
# 部署同声传译翻译服务

services:
  - type: web
    name: simul-translate
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    plan: free
    autoDeploy: true
