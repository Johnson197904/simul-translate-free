<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>同声传译</title>
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="免费实时同声传译工具，支持多语言">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- 顶部状态栏 -->
        <header class="header">
            <div class="header-brand">
                <div class="brand-icon">
                    <i class="fas fa-wand-magic-sparkles"></i>
                </div>
                <div class="brand-text">
                    <h1>同声传译</h1>
                    <p id="statusLine">准备就绪</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btnSettings" title="设置">
                    <i class="fas fa-sliders"></i>
                </button>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main">
            <!-- 语言选择栏 -->
            <div class="lang-bar">
                <div class="lang-select-group">
                    <label>源语言</label>
                    <div class="lang-pills" id="sourcePills">
                        <button class="pill active" data-value="auto">自动检测</button>
                        <button class="pill" data-value="zh-CN">中文</button>
                        <button class="pill" data-value="en">英文</button>
                        <button class="pill" data-value="ja">日文</button>
                        <button class="pill" data-value="ko">韩文</button>
                        <button class="pill" data-value="fr">法文</button>
                        <button class="pill" data-value="de">德文</button>
                        <button class="pill" data-value="es">西班牙</button>
                        <button class="pill" data-value="ru">俄文</button>
                        <button class="pill" data-value="ar">阿拉伯</button>
                    </div>
                    <select id="sourceLang" class="lang-select-hidden">
                        <option value="auto">自动检测</option>
                        <option value="zh-CN">中文</option>
                        <option value="en">英文</option>
                        <option value="ja">日文</option>
                        <option value="ko">韩文</option>
                        <option value="fr">法文</option>
                        <option value="de">德文</option>
                        <option value="es">西班牙文</option>
                        <option value="ru">俄文</option>
                        <option value="ar">阿拉伯文</option>
                    </select>
                </div>

                <button class="swap-btn" id="swapLangs" title="交换语言">
                    <i class="fas fa-right-left"></i>
                </button>

                <div class="lang-select-group">
                    <label>目标语言</label>
                    <div class="lang-pills" id="targetPills">
                        <button class="pill active" data-value="en">英文</button>
                        <button class="pill" data-value="zh-CN">中文</button>
                        <button class="pill" data-value="ja">日文</button>
                        <button class="pill" data-value="ko">韩文</button>
                        <button class="pill" data-value="fr">法文</button>
                        <button class="pill" data-value="de">德文</button>
                        <button class="pill" data-value="es">西班牙</button>
                        <button class="pill" data-value="ru">俄文</button>
                        <button class="pill" data-value="ar">阿拉伯</button>
                        <button class="pill" data-value="vi">越南</button>
                    </div>
                    <select id="targetLang" class="lang-select-hidden">
                        <option value="en">英文</option>
                        <option value="zh-CN">中文</option>
                        <option value="ja">日文</option>
                        <option value="ko">韩文</option>
                        <option value="fr">法文</option>
                        <option value="de">德文</option>
                        <option value="es">西班牙文</option>
                        <option value="ru">俄文</option>
                        <option value="ar">阿拉伯文</option>
                        <option value="vi">越南文</option>
                    </select>
                </div>
            </div>

            <!-- 录音区 -->
            <div class="record-section">
                <div class="record-area" id="recordArea">
                    <div class="record-ring" id="recordRing">
                        <div class="ring-inner">
                            <button class="mic-btn" id="micBtn">
                                <i class="fas fa-microphone" id="micIcon"></i>
                            </button>
                        </div>
                        <div class="ring-wave" id="ringWave"></div>
                    </div>
                    <p class="record-hint" id="recordHint">点击麦克风开始说话</p>
                    <p class="record-hint error-hint" id="recordHintError" style="display:none"></p>
                </div>
            </div>

            <!-- 文字区域 -->
            <div class="text-section">
                <div class="text-card source-card">
                    <div class="text-card-header">
                        <span class="text-card-lang" id="sourceLangTag">中文</span>
                        <span class="detect-badge" id="detectBadge" style="display:none"></span>
                        <span class="text-card-count" id="sourceCount">0 字</span>
                    </div>
                    <div class="text-card-body" id="sourceTextDisplay">
                        <p class="text-placeholder">等待识别...</p>
                    </div>
                </div>

                <button class="translate-arrow-btn" id="translateNowBtn" title="翻译">
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="text-card target-card">
                    <div class="text-card-header">
                        <span class="text-card-lang" id="targetLangTag">英文</span>
                        <span class="text-card-count" id="targetCount">0 字</span>
                    </div>
                    <div class="text-card-body" id="targetTextDisplay">
                        <p class="text-placeholder">翻译结果</p>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-bar">
                <button class="action-btn" id="speakBtn" title="朗读翻译结果">
                    <i class="fas fa-volume-high"></i>
                    <span>朗读</span>
                </button>
                <button class="action-btn" id="copyBtn" title="复制翻译结果">
                    <i class="fas fa-copy"></i>
                    <span>复制</span>
                </button>
                <button class="action-btn" id="clearBtn" title="清空">
                    <i class="fas fa-eraser"></i>
                    <span>清空</span>
                </button>
                <button class="action-btn" id="historyBtn" title="历史记录">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span>历史</span>
                </button>
            </div>

            <!-- 手动输入区 -->
            <div class="input-section">
                <textarea id="manualInput" placeholder="或直接输入文字翻译..." rows="2"></textarea>
                <button class="send-btn" id="translateManualBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>

        <!-- 历史记录面板 -->
        <div class="panel" id="historyPanel">
            <div class="panel-header">
                <h3><i class="fas fa-clock-rotate-left"></i> 翻译历史</h3>
                <button class="icon-btn" id="closeHistoryBtn"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="panel-body">
                <div class="history-list" id="historyList">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无记录</p>
                    </div>
                </div>
            </div>
            <div class="panel-footer">
                <button class="text-btn" id="clearHistoryBtn"><i class="fas fa-trash"></i> 清空</button>
                <button class="text-btn" id="exportHistoryBtn"><i class="fas fa-download"></i> 导出</button>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="panel" id="settingsPanel">
            <div class="panel-header">
                <h3><i class="fas fa-sliders"></i> 设置</h3>
                <button class="icon-btn" id="closeSettingsBtn"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="panel-body">
                <div class="setting-item">
                    <div class="setting-label">
                        <span>自动朗读翻译</span>
                        <small>翻译完成后自动播放语音</small>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="autoSpeak" checked>
                        <span class="toggle-track"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span>语音速度</span>
                        <small><span id="speedVal">1.0</span> x</small>
                    </div>
                    <input type="range" id="voiceSpeed" min="0.5" max="2" step="0.1" value="1" class="range-input">
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span>语音音调</span>
                        <small><span id="pitchVal">1.0</span></small>
                    </div>
                    <input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1" class="range-input">
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        <span>检测语言</span>
                        <small>自动检测输入文本语言</small>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="autoDetect" checked>
                        <span class="toggle-track"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Toast 提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
